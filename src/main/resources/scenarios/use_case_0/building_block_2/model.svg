<svg xmlns="http://www.w3.org/2000/svg" viewBox="-600 -400 2400 800" width="100%" height="100%">
    <style>
        .track-dark { stroke: #000000; stroke-width: 4; fill: none; stroke-linecap: square; stroke-linejoin: round; }
        .track-light-dashed { stroke: #888888; stroke-width: 4; fill: none; stroke-linecap: square; stroke-linejoin:
        round; stroke-dasharray: 12, 12; }
    </style>

    <!-- Outer 500m Moving Blocks (Grey Dashed) -->
    <path class="track-light-dashed" d="M -500 0 L 0 0"/>
    <path class="track-light-dashed" d="M 630 0 L 1130 0"/>

    <!-- Inner Track (Black) -->
    <path class="track-dark" d="M 0 0 L 80 0 L 550 0 L 630 0"/>

    <!-- Directional Double Triangle in the middle of the pseudo platform (Left to Right / Blue) -->
    <g transform="translate(315, 0) rotate(0)">
        <polygon points="-33,-15 -3,0 -33,15" fill="#0000FF"/>
        <polygon points="3,-15 33,0 3,15" fill="#0000FF"/>
    </g>
</svg>