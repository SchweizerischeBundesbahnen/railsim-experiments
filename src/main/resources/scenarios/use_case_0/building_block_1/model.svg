<svg xmlns="http://www.w3.org/2000/svg" viewBox="-600 -400 2400 800" width="100%" height="100%">
    <style>
        .track-dark { stroke: #333333; stroke-width: 4; fill: none; stroke-linecap: square; stroke-linejoin: round; }
        .track-light { stroke: #AAAAAA; stroke-width: 4; fill: none; stroke-linecap: square; stroke-linejoin: round; }
        .platform { stroke: #99CCFF; stroke-width: 20; fill: none; stroke-linecap: butt; }
    </style>

    <line class="platform" x1="80" y1="0" x2="550" y2="0"/>

    <!-- Outer 500m Fixed Blocks -->
    <path class="track-light" d="M -500 0 L 0 0"/>
    <path class="track-light" d="M 630 0 L 1130 0"/>

    <!-- Inner Track -->
    <path class="track-dark" d="M 0 0 L 80 0 L 550 0 L 630 0"/>

    <!-- Directional Triangles (Left to Right / Blue) -->
    <g transform="translate(-250, 0) rotate(0)">
        <polygon points="-10,-10 10,0 -10,10" fill="#0000FF"/>
    </g>
    <g transform="translate(880, 0) rotate(0)">
        <polygon points="-10,-10 10,0 -10,10" fill="#0000FF"/>
    </g>
</svg>